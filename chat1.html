<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>غرفة الدردشة والتحدي - SINU</title>
    <!-- استدعاء مكتبة ethers.js للتحدث مع البلوكشين والمحافظ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js" type="text/javascript"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .chat-header {
            background-color: #1e293b;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .chat-header img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid #38bdf8;
        }
        .header-info h4 { margin: 0; font-size: 16px; }
        .header-info span { font-size: 12px; color: #22c55e; }
        
        /* زر تحدي PvE */
        .pve-btn {
            margin-right: auto;
            background: linear-gradient(135deg, #f43f5e, #be123c);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .chat-box {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 75%;
            padding: 10px 15px;
            border-radius: 12px;
            font-size: 15px;
        }
        .message.bot { background-color: #1e293b; align-self: flex-start; border-bottom-right-radius: 2px; }
        .message.user { background-color: #0284c7; align-self: flex-end; border-bottom-left-radius: 2px; }
        .input-area { background-color: #1e293b; padding: 15px; display: flex; gap: 10px; }
        .input-area input {
            flex-grow: 1; background-color: #0f172a; border: 1px solid #334155;
            color: white; padding: 12px; border-radius: 8px; font-size: 15px; outline: none;
        }
        .input-area button { background-color: #38bdf8; color: #0f172a; border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="chat-header">
        <img src="rose1.png" alt="أمل">
        <div class="header-info">
            <h4>أمل 🌹</h4>
            <span>متصلة الآن</span>
        </div>
        <!-- عند الضغط يتم استدعاء دالة الاغتيال من العقد -->
        <button class="pve-btn" onclick="startPvEChallenge()">تنفيذ اغتيال PvE ⚔️</button>
    </div>

    <div class="chat-box" id="chatBox">
        <div class="message bot">
            أهلاً بك! أنا جاهزة لتحدي الـ PvE والاغتيالات الخاص بـ SINU Syndicate، هل محفظتك مستعدة للمعركة؟ 🎮🔥
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="messageInput" placeholder="اكتب رسالتك هنا...">
        <button onclick="sendUserMessage()">إرسال</button>
    </div>

    <script>
        // ========================================================
        // 🛠️ إعدادات الـ Web3 وعقد SINU Syndicate الحقيقي
        // ========================================================
        
        // 1. ضع هنا عنوان عقدك الذكي الذي نشرته على شبكة Base
        const contractAddress = "0x3E71427c4F4c3aE6DBA472Ccb17076E2148A1231";

        // ========================================================
        // 🎮 دالة التفاعل مع العقد واستدعاء الاغتيال (PvE)
        // ========================================================

        async function startPvEChallenge() {
            if (typeof window.ethereum !== 'undefined') {
                try {
                    // 1. الاتصال بالمحفظة
                    const provider = new ethers.providers.Web3Provider(window.ethereum);
                    await provider.send("eth_requestAccounts", []);
                    const signer = provider.getSigner();
                    
                    // 2. ربط العقد بالـ ABI والعنوان
                    const gameContract = new ethers.Contract(contractAddress, contractABI, signer);
                    
                    appendSystemMessage("🔄 جاري إرسال معاملة استدعاء دالة الاختيال (executePveAssassination)...");
                    
                    // 3. استدعاء دالة الـ PvE الحقيقية من عقدك
                    const tx = await gameContract.executePveAssassination();
                    
                    appendSystemMessage("⏳ المعاملة قيد البث على شبكة Base، يرجى الانتظار...");
                    await tx.wait(); // الانتظار حتى تأكيد المعاملة في البلوكشين
                    
                    appendSystemMessage("💥 تم تنفيذ الاغتيال بنجاح! تحقق من رصيدك ومن عملية الحرق تلقائياً في المحفظة 🚀");

                } catch (error) {
                    console.error(error);
                    appendSystemMessage("❌ فشلت المعاملة أو تم إلغاؤها من قبل المستخدم.");
                }
            } else {
                alert("يرجى فتح الموقع من متصفح يدعم الكريبتو مثل MetaMask الموبايل!");
            }
        }

        function appendSystemMessage(text) {
            let chatBox = document.getElementById('chatBox');
            let msg = document.createElement('div');
            msg.className = 'message bot';
            msg.style.background = '#334155';
            msg.innerText = text;
            chatBox.appendChild(msg);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function sendUserMessage() {
            let input = document.getElementById('messageInput');
            let chatBox = document.getElementById('chatBox');
            if (input.value.trim() !== "") {
                let userMsg = document.createElement('div');
                userMsg.className = 'message user';
                userMsg.innerText = input.value;
                chatBox.appendChild(userMsg);
                input.value = "";
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }
    </script>
</body>
</html>
